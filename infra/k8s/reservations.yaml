apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: car-rental
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
        - name: reservation-service
          image: ghcr.io/your-user/car-rental-reservations:latest
          ports:
            - containerPort: 8002
          env:
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8001
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: car-rental
spec:
  selector:
    app: reservation-service
  ports:
    - port: 8002
      targetPort: 8002
