apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: car-rental
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/your-user/car-rental-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8001
            - name: RESERVATION_SERVICE_URL
              value: http://reservation-service:8002
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: car-rental
spec:
  type: LoadBalancer
  selector:
    app: gateway-service
  ports:
    - port: 80
      targetPort: 8000
